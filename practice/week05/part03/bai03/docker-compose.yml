services:
  flask-1:
    build: .
    container_name: bai03_flask_1
    environment:
      INSTANCE_NAME: flask-1
    networks:
      - app_net

  flask-2:
    build: .
    container_name: bai03_flask_2
    environment:
      INSTANCE_NAME: flask-2
    networks:
      - app_net

  nginx:
    image: nginx:latest
    container_name: bai03_nginx
    depends_on:
      - flask-1
      - flask-2
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app_net

networks:
  app_net:
    driver: bridge
