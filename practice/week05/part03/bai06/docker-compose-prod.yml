services:
  app:
    build:
      context: .
      target: prod
    container_name: bai06_app_prod
    expose:
      - "8000"

  nginx:
    image: nginx:latest
    container_name: bai06_nginx
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
