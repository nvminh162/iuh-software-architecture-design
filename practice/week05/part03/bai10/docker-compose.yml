services:
  traefik:
    image: traefik:v3.1
    container_name: bai10_traefik
    command:
      - --api.dashboard=true
      - --api.insecure=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  flask-app:
    image: nginxdemos/hello:latest
    container_name: bai10_flask_demo
    labels:
      - traefik.enable=true
      - traefik.http.routers.flask.rule=Host(`flask.localhost`)
      - traefik.http.routers.flask.entrypoints=web
      - traefik.http.services.flask.loadbalancer.server.port=80

  wordpress-db:
    image: mysql:5.7
    container_name: bai10_wordpress_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password

  wordpress:
    image: wordpress:latest
    container_name: bai10_wordpress
    depends_on:
      - wordpress-db
    environment:
      WORDPRESS_DB_HOST: wordpress-db:3306
      WORDPRESS_DB_NAME: wordpress
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
    labels:
      - traefik.enable=true
      - traefik.http.routers.wordpress.rule=Host(`wp.localhost`)
      - traefik.http.routers.wordpress.entrypoints=web
      - traefik.http.services.wordpress.loadbalancer.server.port=80
