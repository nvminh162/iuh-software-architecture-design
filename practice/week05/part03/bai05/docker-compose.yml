services:
  vote:
    image: dockersamples/examplevotingapp_vote:before
    container_name: bai05_vote
    ports:
      - "5000:80"
    depends_on:
      - redis

  result:
    image: dockersamples/examplevotingapp_result:before
    container_name: bai05_result
    ports:
      - "5001:80"
    depends_on:
      - db

  worker:
    image: dockersamples/examplevotingapp_worker
    container_name: bai05_worker
    depends_on:
      - redis
      - db

  redis:
    image: redis:alpine
    container_name: bai05_redis

  db:
    image: postgres:15-alpine
    container_name: bai05_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: votes
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data:
