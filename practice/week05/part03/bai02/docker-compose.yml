services:
  mongodb:
    image: mongo:latest
    container_name: bai02_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  node-app:
    build: .
    container_name: bai02_node_app
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongodb:27017/myapp
    ports:
      - "3000:3000"

volumes:
  mongo_data:
