spring:
  application:
    name: lab02
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  datasource:
    # 1. Functional Partition: Inventory Database
    inventory:
      jdbc-url: jdbc:mariadb://localhost:3306/inventory_db
      username: root
      password: root
      driver-class-name: org.mariadb.jdbc.Driver

    # 2. Functional Partition: Orders Database
    orders:
      jdbc-url: jdbc:mariadb://localhost:3306/order_db
      username: root
      password: root
      driver-class-name: org.mariadb.jdbc.Driver
